name: Deploy Baota

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bbzg_app-baota-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.BAOTA_SSH_KEY }}" > ~/.ssh/baota_deploy
          chmod 600 ~/.ssh/baota_deploy
          ssh-keyscan -H "${{ secrets.BAOTA_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.BAOTA_HOST }}
          DEPLOY_USER: ${{ secrets.BAOTA_USER }}
          DEPLOY_PATH: /www/wwwroot/bbzg.baymaxgroup.com
          DEPLOY_PROJECT: bbzg_app
          DEPLOY_NODE_VERSION: node20
          DEPLOY_DOMAIN: bbzg.baymaxgroup.com
          DEPLOY_PORT: "3000"
          DEPLOY_HEALTH_PATH: /api/health
          SSH_OPTS: -i ~/.ssh/baota_deploy -o StrictHostKeyChecking=yes
        run: bash scripts/deploy-baota.sh
